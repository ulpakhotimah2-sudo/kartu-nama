<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Nama Digital</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #1e3c72, #000);
}

/* BINTANG */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 80s linear infinite;
    opacity: 0.25;
}

@keyframes moveStars {
    from {transform: translate(0,0);}
    to {transform: translate(-400px,-400px);}
}

/* CARD */
.card {
    position: relative;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
}

/* FOTO */
.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin: 10px 5px;
    padding: 8px 15px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #87cefa, #ff9ad5);
}

</style>
</head>
<body>

<div class="card">
    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Laila" class="profile-img">

    <h1>Laila Ulfa Khotimah</h1>
    <p>Calon AI Engineer ✨</p>

    <a href="https://www.tiktok.com/@fafa_mnizzz" class="btn">TikTok</a>
</div>

</body>
</html>
